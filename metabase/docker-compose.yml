services:
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    hostname: metabase
    volumes:
      - /dev/urandom:/dev/random:ro
    ports:
      - 3001:3001
    environment:
      MB_JETTY_PORT: 3001
      MB_DB_TYPE: postgres
      MB_DB_HOST: 127.0.0.1
      MB_DB_PORT: 5432
      MB_DB_DBNAME: metabase
      MB_DB_USER: metabase_user
      MB_DB_PASS: metabase_password
